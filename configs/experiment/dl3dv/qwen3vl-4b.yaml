# @package _global_

defaults:
  - override /model: probe


# Qwen3-VL-4B-Instruct probe training configuration.
# Same extractor / same 36 LLM layers as Qwen3-VL-8B, but text_config.hidden_size
# is 2560 (vs 4096 for 8B), so the probe must use the matching video_channels.
# Features are written to <out_root>/qwen3vl-4b/ via `--vfm-name qwen3vl-4b` in
# features/run_dl3dv.py, so they live side-by-side with the 8B output.

seed: 42

tags: ["train", "dl3dv"]

task_name: dl3dv
job_name: default # must set in the command line

autoresume: true
# ckpt_path: /path/to/resume.ckpt  # uncomment to resume training from a checkpoint

gt_num_frames: 4
batch_size: 10

paths:
  run_folder_name: vlm_${task_name}_${job_name}_views${gt_num_frames}_bs${batch_size}

# Feature configuration
# Layers: 19, 21, 23, 25, 27, 29, 31, 33, 35
feat_postfix: _layer25

data:
  data_module:
    train_datasets:
    - VideoProbeDataset(root='${data.data_root}', root_vfm='${data.feat_root}', subset='all', split='train', vfm_name='qwen3vl-4b', feat_postfix='${feat_postfix}', feat_pixalign=True, num_views=${gt_num_frames}, min_view_interval=5, context_len=76, query_idx_divisor=4)
    validation_datasets:
    - VideoProbeDataset(root='${data.data_root}', root_vfm='${data.feat_root}', subset='all', split='val', vfm_name='qwen3vl-4b', feat_postfix='${feat_postfix}', feat_pixalign=True, num_views=${gt_num_frames}, min_view_interval=5, context_len=76, query_idx_divisor=4, seed=0)
    batch_size_per_device: ${batch_size}
    batch_size_per_device_val: ${batch_size}
    num_workers: 8
    num_workers_val: 8

logger:
  wandb:
    name: vlm_${task_name}_${job_name}_views${gt_num_frames}_bs${batch_size}
    group: ${task_name}

model:
  probe_type: pixalign
  probe:
    _target_: probing_vlm_vgm.models.components.probe_pixalign.ProbeModelPA
    embed_dim: 1024
    video_channels: 2560  # Qwen3-VL-4B text_config.hidden_size (vs 4096 for 8B)
    backbone_depth: 4
    dpt_intermediate_layer_idx: [0, 1, 2, 3]
    gradient_checkpointing: true
    active_heads: ["depth", "point", "camera"]
  val_viz_freq: 5
  train_eval_freq: 5000
  save_pointcloud: false

  loss_weights:
    pmap: 1.0
    dmap: 1.0
    pmap_grad: 0.0
    dmap_grad: 0.0
    camera: 1.0

  normalize_pred: true
  normalize_gt: true
  soft_bg_weight: 0.0
  cmap_power: 1.0

trainer:
  devices: auto
  max_epochs: 60
  precision: bf16-mixed
