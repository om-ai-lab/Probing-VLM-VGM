# @package _global_

defaults:
  - override /model: probe


# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

# seed for random number generators in pytorch, numpy and python.random
seed: 42

tags: ["train", "dl3dv"]

task_name: dl3dv
job_name: default # must set in the command line

autoresume: true
# ckpt_path: /path/to/resume.ckpt  # uncomment to resume training from a checkpoint

gt_num_frames: 4
batch_size: 10

# Optional spatial downsampling of the VFM feature map (H, W) to equalize token
# counts across VFMs. Set via CLI, e.g. +target_spatial_size=[17,30] to match Qwen3-VL,
# [16,16] to match InternVL3. null means keep native feature resolution.
target_spatial_size: [15,22]

paths:
  run_folder_name: vg_${task_name}_${job_name}_views${gt_num_frames}_bs${batch_size}_${target_spatial_size}

feat_postfix: _t2v_5b_t749_layer20
data:
  data_module:
    train_datasets:
    - VideoProbeDataset(root='${data.data_root}', root_vfm='${data.feat_root}', subset='all', split='train', vfm_name='cogvideox-t2v-5b', feat_postfix='${feat_postfix}', feat_pixalign=True, num_views=${gt_num_frames}, min_view_interval=5, context_len=76, query_idx_divisor=4, target_spatial_size=${target_spatial_size})
    validation_datasets:
    - VideoProbeDataset(root='${data.data_root}', root_vfm='${data.feat_root}', subset='all', split='val', vfm_name='cogvideox-t2v-5b', feat_postfix='${feat_postfix}', feat_pixalign=True, num_views=${gt_num_frames}, min_view_interval=5, context_len=76, query_idx_divisor=4, seed=0, target_spatial_size=${target_spatial_size})
    batch_size_per_device: ${batch_size}
    batch_size_per_device_val: ${batch_size}
    num_workers: 8
    num_workers_val: 8

logger:
  wandb:
    name: vg_${task_name}_${job_name}_views${gt_num_frames}_bs${batch_size}_${target_spatial_size}
    group: ${task_name}

model:
  probe_type: pixalign
  probe:
    _target_: probing_vlm_vgm.models.components.probe_pixalign.ProbeModelPA
    embed_dim: 1024
    video_channels: 3072
    backbone_depth: 4
    dpt_intermediate_layer_idx: [0, 1, 2, 3]
    gradient_checkpointing: true
    active_heads: ["depth", "point", "camera"]
  val_viz_freq: 5
  train_eval_freq: 5000
  save_pointcloud: false

  loss_weights:
    pmap: 1.0
    dmap: 1.0
    pmap_grad: 0.0
    dmap_grad: 0.0
    camera: 1.0

  normalize_pred: true
  normalize_gt: true
  soft_bg_weight: 0.0
  cmap_power: 1.0

trainer:
  devices: auto
  max_epochs: 60
  precision: bf16-mixed
  # strategy: deepspeed_stage_2
  # strategy:
  #   _target_: lightning.pytorch.strategies.DeepSpeedStrategy
  #   timeout:
  #     _target_: datetime.timedelta
  #     minutes: 80
