# @package _global_

defaults:
  - override /model: probe


# Cambrian-S-7B probe training configuration
# LLM: Qwen2.5-7B-Instruct (28 layers, hidden 3584)
# Vision tower: SigLIP2-so400m-patch14-384 (frozen)
# Note: Cambrian-S forces a fixed 8x8 padded-square spatial grid per frame
# (vs Qwen2.5-VL's ~19x34 = 646 tok/frame at 960x540). The DPT head therefore
# upsamples ~67x/axis from 8x8 to 540x960; expect blockier dense outputs.
# Black-bar tokens (~30-40% of the 64 tokens for 16:9 input) are kept as-is —
# the DPT learns to ignore them. See vlm_vs_videomodel_3d.md §4 for fairness notes.

seed: 42

tags: ["train", "dl3dv"]

task_name: dl3dv
job_name: default # must set in the command line

autoresume: true
# ckpt_path: /path/to/resume.ckpt  # uncomment to resume training from a checkpoint

gt_num_frames: 12
batch_size: 5

paths:
  run_folder_name: vlm_${task_name}_${job_name}_views${gt_num_frames}_bs${batch_size}

# Feature configuration
# Layers extracted by features/cambrian_s: 15, 18, 21, 24 (matches features/run_dl3dv.py example)
feat_postfix: _layer21

data:
  data_module:
    train_datasets:
    - VideoProbeDataset(root='data/DL3DV/DL3DV-processed', root_vfm='${data.feat_root}', subset='all', split='train', vfm_name='cambrian_s', feat_postfix='${feat_postfix}', feat_pixalign=True, num_views=${gt_num_frames}, min_view_interval=5, context_len=76, query_idx_divisor=4)
    validation_datasets:
    - VideoProbeDataset(root='data/DL3DV/DL3DV-processed', root_vfm='${data.feat_root}', subset='all', split='val', vfm_name='cambrian_s', feat_postfix='${feat_postfix}', feat_pixalign=True, num_views=${gt_num_frames}, min_view_interval=5, context_len=76, query_idx_divisor=4, seed=0)
    batch_size_per_device: ${batch_size}
    batch_size_per_device_val: ${batch_size}
    num_workers: 8
    num_workers_val: 8

logger:
  wandb:
    name: vlm_${task_name}_${job_name}_views${gt_num_frames}_bs${batch_size}
    group: ${task_name}

model:
  probe_type: pixalign
  probe:
    _target_: probing_vlm_vgm.models.components.probe_pixalign.ProbeModelPA
    embed_dim: 1024
    video_channels: 3584  # Cambrian-S Qwen2.5-7B hidden size
    backbone_depth: 4
    dpt_intermediate_layer_idx: [0, 1, 2, 3]
    gradient_checkpointing: true
    active_heads: ["depth", "point", "camera"]
  val_viz_freq: 5
  train_eval_freq: 5000
  save_pointcloud: false

  loss_weights:
    pmap: 1.0
    dmap: 1.0
    pmap_grad: 0.0
    dmap_grad: 0.0
    camera: 1.0

  normalize_pred: true
  normalize_gt: true
  soft_bg_weight: 0.0
  cmap_power: 1.0

trainer:
  devices: auto
  max_epochs: 60
  precision: bf16-mixed
